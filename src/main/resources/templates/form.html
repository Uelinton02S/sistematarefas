<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${tarefa.id != null} ? 'Editar Tarefa' : 'Nova Tarefa'">Tarefa</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        nav { background: #2c3e50; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        nav span { color: #ccc; font-size: 14px; }
        .container { max-width: 860px; margin: 30px auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        label { font-size: 14px; color: #555; }
        input, select, textarea { width: 100%; padding: 8px; margin: 5px 0 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn { padding: 9px 18px; background: #2c3e50; color: white; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; display: inline-block; }
        .btn-logout { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 14px; margin-left: 14px; }
    </style>
</head>
<body>

<nav>
    <div>
        <a th:href="@{/tarefas}">Tarefas</a>
        <a th:href="@{/tarefas/nova}">+ Nova Tarefa</a>
    </div>
    <div>
        <span>Olá, <strong th:text="${usuario}">Usuário</strong></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-logout">Sair</button>
        </form>
    </div>
</nav>

<div class="container">
    <h2 th:text="${tarefa.id != null} ? 'Editar Tarefa' : 'Nova Tarefa'">Tarefa</h2>

    <form th:action="${tarefa.id != null}
                     ? @{/tarefas/{id}/editar(id=${tarefa.id})}
                     : @{/tarefas}"
          method="post">

        <label>Título</label>
        <input type="text" name="titulo" th:value="${tarefa.titulo}" required>

        <label>Descrição</label>
        <textarea name="descricao" rows="4" th:text="${tarefa.descricao}"></textarea>

        <label>Status</label>
        <select name="status">
            <option value="pendente"     th:selected="${tarefa.status == 'pendente'}">Pendente</option>
            <option value="em andamento" th:selected="${tarefa.status == 'em andamento'}">Em andamento</option>
            <option value="concluida"    th:selected="${tarefa.status == 'concluida'}">Concluída</option>
        </select>

        <button type="submit" class="btn"
                th:text="${tarefa.id != null} ? 'Salvar alterações' : 'Criar Tarefa'">Salvar</button>
        <a th:href="@{/tarefas}" style="margin-left:12px; color:#555;">Cancelar</a>
    </form>
</div>

</body>
</html>
