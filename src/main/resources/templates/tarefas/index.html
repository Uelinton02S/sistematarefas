<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Tarefas</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f4f4; }
        nav { background: #2c3e50; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-right: 16px; }
        nav span { color: #ccc; font-size: 14px; }
        .container { max-width: 860px; margin: 30px auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 16px; }
        th, td { padding: 10px 14px; border: 1px solid #ddd; text-align: left; }
        th { background: #2c3e50; color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .btn { padding: 9px 18px; background: #2c3e50; color: white; border: none; cursor: pointer; border-radius: 4px; text-decoration: none; display: inline-block; }
        .btn-excluir { background: #c0392b; padding: 6px 12px; }
        .btn-editar  { background: #2980b9; padding: 6px 12px; }
        .btn-novo    { background: #27ae60; margin-bottom: 14px; }
        .btn-logout  { background: none; border: none; color: #e74c3c; cursor: pointer; font-size: 14px; margin-left: 14px; }
        .badge-pendente     { background: #e67e22; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .badge-concluida    { background: #27ae60; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
        .badge-em-andamento { background: #2980b9; color: white; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<nav>
    <div>
        <a th:href="@{/tarefas}">Tarefas</a>
        <a th:href="@{/tarefas/nova}">+ Nova Tarefa</a>
    </div>
    <div>
        <span>Olá, <strong th:text="${usuario}">Usuário</strong></span>
        <form th:action="@{/logout}" method="post" style="display:inline">
            <button type="submit" class="btn-logout">Sair</button>
        </form>
    </div>
</nav>

<div class="container">
    <h2>Lista de Tarefas</h2>
    <a th:href="@{/tarefas/nova}" class="btn btn-novo">+ Nova Tarefa</a>

    <table>
        <tr>
            <th>ID</th><th>Título</th><th>Status</th><th>Ações</th>
        </tr>
        <tr th:if="${tarefas.empty}">
            <td colspan="4" style="text-align:center">Nenhuma tarefa cadastrada.</td>
        </tr>
        <tr th:each="tarefa : ${tarefas}">
            <td th:text="${tarefa.id}"></td>
            <td th:text="${tarefa.titulo}"></td>
            <td>
                <span th:class="'badge-' + ${tarefa.status.replace(' ', '-')}"
                      th:text="${tarefa.status}"></span>
            </td>
            <td>
                <a th:href="@{/tarefas/{id}/editar(id=${tarefa.id})}" class="btn btn-editar">Editar</a>
                <form th:action="@{/tarefas/{id}/excluir(id=${tarefa.id})}" method="post" style="display:inline">
                    <button type="submit" class="btn btn-excluir"
                            onclick="return confirm('Excluir esta tarefa?')">Excluir</button>
                </form>
            </td>
        </tr>
    </table>
</div>

</body>
</html>
