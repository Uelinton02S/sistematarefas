
<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .box { background: white; padding: 32px; border-radius: 8px; width: 340px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        h2 { text-align: center; color: #2c3e50; margin-bottom: 20px; }
        label { font-size: 14px; color: #555; }
        input { width: 100%; padding: 9px; margin: 5px 0 14px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { width: 100%; padding: 10px; background: #2c3e50; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 15px; }
        .erro    { color: #c0392b; text-align: center; margin-bottom: 12px; font-size: 14px; background: #fdecea; padding: 8px; border-radius: 4px; }
        .sucesso { color: #27ae60; text-align: center; margin-bottom: 12px; font-size: 14px; background: #eafaf1; padding: 8px; border-radius: 4px; }
    </style>
</head>
<body>
<div class="box">
    <h2>Sistema de Tarefas</h2>

    <div th:if="${param.error}"  class="erro">Email ou senha inválidos.</div>
    <div th:if="${param.logout}" class="sucesso">Logout realizado com sucesso!</div>

    <form th:action="@{/login}" method="post">
        <label>Email</label>
        <input type="email" name="email" required placeholder="seu@email.com">
        <label>Senha</label>
        <input type="password" name="password" required placeholder="••••••••">
        <button type="submit">Entrar</button>
    </form>
</div>
</body>
</html>
